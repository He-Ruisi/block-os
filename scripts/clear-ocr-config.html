<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清理 OCR 插件配置</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      color: #333;
      margin-top: 0;
    }
    .status {
      padding: 15px;
      border-radius: 4px;
      margin: 20px 0;
      font-weight: 500;
    }
    .status.info {
      background: #e3f2fd;
      color: #1976d2;
    }
    .status.success {
      background: #e8f5e9;
      color: #388e3c;
    }
    .status.warning {
      background: #fff3e0;
      color: #f57c00;
    }
    button {
      background: #1976d2;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      margin-right: 10px;
    }
    button:hover {
      background: #1565c0;
    }
    button.secondary {
      background: #757575;
    }
    button.secondary:hover {
      background: #616161;
    }
    .config-display {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 4px;
      margin: 15px 0;
      font-family: monospace;
      font-size: 14px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .instructions {
      background: #fff3e0;
      padding: 15px;
      border-radius: 4px;
      margin: 20px 0;
      border-left: 4px solid #f57c00;
    }
    .instructions h3 {
      margin-top: 0;
      color: #f57c00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 OCR 插件配置清理工具</h1>
    
    <div class="status info">
      <strong>说明：</strong>此工具用于清理 localStorage 中的旧 OCR 插件配置，解决 CORS 跨域问题。
    </div>

    <div class="instructions">
      <h3>使用步骤：</h3>
      <ol>
        <li>点击"查看当前配置"按钮，检查是否有旧配置</li>
        <li>如果 apiUrl 是 HTTPS URL，点击"清理配置"</li>
        <li>清理后，关闭此页面</li>
        <li>重启开发服务器（<code>bun run dev</code>）</li>
        <li>刷新 BlockOS 应用页面</li>
      </ol>
    </div>

    <div>
      <button onclick="checkConfig()">查看当前配置</button>
      <button onclick="clearConfig()">清理配置</button>
      <button class="secondary" onclick="resetConfig()">重置为默认值</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    function checkConfig() {
      const apiUrl = localStorage.getItem('plugin:ocr-plugin:apiUrl')
      const apiToken = localStorage.getItem('plugin:ocr-plugin:apiToken')
      
      const result = document.getElementById('result')
      
      if (!apiUrl && !apiToken) {
        result.innerHTML = `
          <div class="status info">
            <strong>✓ 未找到配置</strong><br>
            localStorage 中没有 OCR 插件配置。这是正常的，插件会在首次激活时自动创建配置。
          </div>
        `
      } else {
        const hasOldUrl = apiUrl && apiUrl.startsWith('https://')
        result.innerHTML = `
          <div class="status ${hasOldUrl ? 'warning' : 'success'}">
            <strong>${hasOldUrl ? '⚠️ 发现旧配置' : '✓ 配置正常'}</strong>
          </div>
          <div class="config-display">apiUrl: ${apiUrl || '(未设置)'}
apiToken: ${apiToken ? apiToken.substring(0, 20) + '...' : '(未设置)'}</div>
          ${hasOldUrl ? '<div class="status warning"><strong>建议：</strong>点击"清理配置"按钮清除旧的 HTTPS URL</div>' : ''}
        `
      }
    }

    function clearConfig() {
      localStorage.removeItem('plugin:ocr-plugin:apiUrl')
      localStorage.removeItem('plugin:ocr-plugin:apiToken')
      
      const result = document.getElementById('result')
      result.innerHTML = `
        <div class="status success">
          <strong>✓ 配置已清理</strong><br>
          已删除 localStorage 中的 OCR 插件配置。
        </div>
        <div class="instructions">
          <h3>下一步：</h3>
          <ol>
            <li>重启开发服务器（停止后重新运行 <code>bun run dev</code>）</li>
            <li>刷新 BlockOS 应用页面（F5）</li>
            <li>打开 OCR 插件，测试识别功能</li>
          </ol>
        </div>
      `
    }

    function resetConfig() {
      localStorage.setItem('plugin:ocr-plugin:apiUrl', '/api/ocr/layout-parsing')
      localStorage.setItem('plugin:ocr-plugin:apiToken', '74fc1211d4321e9438158dae3d22f8005fd5e4e2')
      
      const result = document.getElementById('result')
      result.innerHTML = `
        <div class="status success">
          <strong>✓ 配置已重置</strong><br>
          已设置为默认配置（使用代理路径）。
        </div>
        <div class="config-display">apiUrl: /api/ocr/layout-parsing
apiToken: 74fc1211d4321e9438158dae3d22f8005fd5e4e2</div>
        <div class="instructions">
          <h3>下一步：</h3>
          <ol>
            <li>刷新 BlockOS 应用页面（F5）</li>
            <li>打开 OCR 插件，测试识别功能</li>
          </ol>
        </div>
      `
    }

    // 页面加载时自动检查配置
    window.onload = checkConfig
  </script>
</body>
</html>
